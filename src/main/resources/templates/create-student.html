<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Data Entry</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white"><h4>New Student Entry</h4></div>
                <div class="card-body">
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <form th:action="@{/view/students}" th:object="${studentDTO}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Surname</label>
                            <input type="text" th:field="*{surname}" class="form-control" th:classappend="${#fields.hasErrors('surname')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Register Student</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
